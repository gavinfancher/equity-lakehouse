# Managed Service for Apache Spark (Serverless) batch config.
#
# Intent: practice/learning sizing for finpipe.
# Data shape: ~200 csv.gz files, ~25-30 MB each (~6 GB compressed,
#   ~30-50 GB inflated). Workloads include OHLC bronze ingest and
#   silver transforms with ~30 window features (lag/lead/rolling aggs
#   partitioned by symbol, ordered by date).
#
# Sized to exercise real Spark behavior (shuffle, AQE, autoscaling,
# skew on window partitionBy) without overprovisioning. Standard tier
# on purpose -- learn the baseline mental model before turning on
# Lightning Engine for comparison runs.

runtime:
  version: "2.2"
  ttl: 1h

tier:
  # standard for learning the baseline. Flip to premium later to A/B
  # against this -- that comparison is the whole point.
  dataproc: standard

lightning_engine:
  enabled: false
  runtime: default          # default | native

driver:
  cores: 4                  # 4 | 8 | 16
  memory: 8g                # standard ceiling: 7424m/core total mem
  memory_overhead: 4g       # PySpark default ~40% of driver memory
  compute_tier: standard
  disk:
    size: 250g
    tier: standard

executor:
  cores: 4
  memory: 8g
  memory_overhead: 4g
  compute_tier: standard
  disk:
    size: 250g
    tier: standard

# Autoscaling. With this data size you almost certainly won't need >4
# executors, but leave headroom so you can watch the scaler react.
autoscaling:
  initial_executors: 2
  min_executors: 2
  max_executors: 8          # 8 * 4 = 32 task slots, plenty for 30-50 GB
  executor_allocation_ratio: 0.3   # lower = scales up more eagerly

# Free-form passthrough; merged last.
properties:
  spark.dataproc.scaling.version: "2"

  # AQE: turn it on. Watches shuffle stages at runtime, coalesces small
  # partitions, handles skewed joins. Educational to compare on/off.
  spark.sql.adaptive.enabled: "true"
  spark.sql.adaptive.coalescePartitions.enabled: "true"
  spark.sql.adaptive.skewJoin.enabled: "true"

  # Default is 200, way too high for this data volume. AQE will coalesce
  # down at runtime, but a lower starting point reduces overhead.
  spark.sql.shuffle.partitions: "64"

  # Iceberg + BigLake metastore (Iceberg REST catalog managed by GCP).
  # Catalog name in Spark SQL is "finpipe" -> finpipe.bronze.equities_minute_aggs etc.
  # Tables show up in BigQuery via the linked dataset (see infra/biglake/setup.sh).
  spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
  spark.sql.catalog.finpipe: "org.apache.iceberg.spark.SparkCatalog"
  spark.sql.catalog.finpipe.type: "rest"
  spark.sql.catalog.finpipe.uri: "https://biglake.googleapis.com/iceberg/v1/restcatalog/extensions/projects/finpipe-494623/locations/us-central1/catalogs/finpipe"
  spark.sql.catalog.finpipe.warehouse: "gs://finpipe-bucket/iceberg/"
  spark.sql.catalog.finpipe.header.x-goog-user-project: "finpipe-494623"
  spark.sql.catalog.finpipe.rest.auth.type: "oauth2"
  spark.sql.catalog.finpipe.io-impl: "org.apache.iceberg.gcp.gcs.GCSFileIO"

labels:
  pipeline: finpipe
  asset: ohlc
  tier: bronze
